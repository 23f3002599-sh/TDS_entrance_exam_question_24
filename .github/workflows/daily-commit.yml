name: Daily Auto Commit

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write   # 🔥 REQUIRED FOR PUSHING COMMITS

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 23f3002599@ds.study.iitm.ac.in Daily Commit Step
        run: |
          echo "Last run: $(date)" > daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "23f3002599@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Daily automated commit - $(date)" || echo "No changes to commit"
          git push
